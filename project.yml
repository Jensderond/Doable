name: Doable
options:
  bundleIdPrefix: nl.redkiwi
  deploymentTarget:
    macOS: "14.0"
packages:
  DoableCore:
    path: Core
targets:
  Doable:
    type: application
    platform: macOS
    sources:
      - App
    dependencies:
      - package: DoableCore
        product: DoableCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.redkiwi.Doable
        PRODUCT_NAME: Doable
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Doable.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "5.0"
  doable:
    type: tool
    platform: macOS
    sources:
      - CLI
    dependencies:
      - package: DoableCore
        product: DoableCore
    settings:
      base:
        PRODUCT_NAME: doable
        PRODUCT_BUNDLE_IDENTIFIER: nl.redkiwi.doable
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.0"
